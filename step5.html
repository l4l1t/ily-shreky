<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>💌</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
</head>
<body style="margin:0; padding:0; overflow:hidden;">

  <!-- Music Modal -->
  <div class="modal" id="musicModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeMusicModal()">X</button>
      <div class="music" role="region" aria-label="Playlist" style="margin:16px 0;">
        <iframe src="https://open.spotify.com/embed/playlist/6h48LqwuHEgrCjrZmRCCGf" width="100%" height="400" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" style="border: var(--mc-border);"></iframe>
      </div>
    </div>
  </div>

  <section id="step5-new" class="active">
    <div class="back-button-top">
      <a href="step4.html" class="btn btn-secondary" style="text-decoration:none; display:inline-block;">← Back</a>
    </div>

    <div id="tunnel-bg"></div>
    <div id="canvas-container-voxel"></div>

    <div class="ui-overlay-voxel">
      <div class="instruction-voxel" id="hint-voxel" onclick="handleVoxelInteraction()">CLICK TO OPEN ENVELOPE</div>
    </div>

    <div class="letter-modal" id="letter-voxel">
      <div class="letter-header">💌 ADD YOUR LETTER HERE 💌</div>
      <div class="letter-content-new">
        <!-- LETTER CONTENT HERE -->
        <div style="text-align:center; margin:24px 0;">
          <button class="btn btn-primary music-button" onclick="openMusicModal()">
            OUR PLAYLIST 💿🫶🏻
          </button>
        </div>
      </div>
      <button class="close-btn-voxel" onclick="closeVoxelLetter()">BACK TO WORLD</button>
    </div>
  </section>

  <script src="script.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      initVoxelStep();
    });
  </script>
</body>
</html>
